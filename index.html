<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>How many layers</title>

<style>
  body {
    font-family: Arial, sans-serif;
    background: #fff;
    color: #111;
    padding: 40px 20px;
  }

  h1 {
    text-align: center;
    margin-bottom: 30px;
  }

  input {
    display: block;
    margin: 0 auto;
    padding: 14px;
    width: 280px;
    border-radius: 10px;
    border: 1px solid #ccc;
  }

  .suggestions {
    max-width: 280px;
    margin: 10px auto;
    border: 1px solid #eee;
    border-radius: 10px;
    overflow: hidden;
  }

  .suggestions div {
    padding: 10px;
    cursor: pointer;
  }

  .suggestions div:hover {
    background: #f5f5f5;
  }

  .main {
    max-width: 420px;
    margin: 40px auto;
  }

  .temp {
    font-size: 48px;
    font-weight: bold;
  }

  .section-title {
    font-size: 18px;
    margin-top: 10px;
  }

  .layers {
    font-size: 22px;
    margin: 10px 0;
  }

  .emoji-row {
    font-size: 28px;
    margin-bottom: 10px;
  }

  .weather {
    font-size: 14px;
    color: #444;
    margin-bottom: 30px;
  }

  .small-cards {
    display: flex;
    gap: 10px;
  }

  .small-card {
    flex: 1;
    border: 1px solid #eee;
    border-radius: 10px;
    padding: 12px;
    text-align: center;
  }

  .small-card .time {
    font-size: 12px;
    color: #666;
  }

  .loading {
    text-align: center;
    margin-top: 40px;
    color: #666;
  }
</style>
</head>

<body>

<h1>How many layers should I wear today?</h1>

<input id="input" placeholder="Start typing your location" autocomplete="off"/>
<div id="suggestions" class="suggestions"></div>

<div id="results"></div>

<script>
const input = document.getElementById("input");
const suggestionsBox = document.getElementById("suggestions");
const resultsDiv = document.getElementById("results");

let selectedLocation = null;
let locationName = "";
let currentCoords = null;

// 🌍 Get user location once
navigator.geolocation.getCurrentPosition(pos => {
  currentCoords = {
    lat: pos.coords.latitude,
    lon: pos.coords.longitude
  };
});

// 🔍 Autocomplete
input.addEventListener("input", async () => {
  const value = input.value;

  if (value.length < 1) {
    suggestionsBox.innerHTML = "";
    return;
  }

  let html = "";

  // Add current location option
  if (currentCoords) {
    html += `
      <div onclick="useCurrentLocation()">
        📍 Use current location
      </div>
    `;
  }

  const res = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${value}`);
  const data = await res.json();

  if (data.results) {
    html += data.results.slice(0,5).map(loc => `
      <div onclick="selectLocation('${loc.name}', '${loc.admin1 || ""}', ${loc.latitude}, ${loc.longitude})">
        ${loc.name}, ${loc.country}
      </div>
    `).join("");
  }

  suggestionsBox.innerHTML = html;
});

// 📍 Use current location
function useCurrentLocation() {
  if (!currentCoords) return;

  selectedLocation = currentCoords;
  locationName = "Your location";
  input.value = "Current location";
  suggestionsBox.innerHTML = "";

  fetchWeather();
}

// 📍 Select searched location
function selectLocation(name, region, lat, lon) {
  selectedLocation = { lat, lon };
  locationName = region ? `${name}, ${region}` : name;
  input.value = name;
  suggestionsBox.innerHTML = "";

  fetchWeather();
}

// 🌤 Weather
async function fetchWeather() {
  resultsDiv.innerHTML = `<div class="loading">Loading weather...</div>`;

  const res = await fetch(
    `https://api.open-meteo.com/v1/forecast?latitude=${selectedLocation.lat}&longitude=${selectedLocation.lon}&hourly=temperature_2m&daily=temperature_2m_max,temperature_2m_min&forecast_days=1`
  );

  const data = await res.json();

  const temps = data.hourly.temperature_2m;

  const now = temps[0];
  const plus6 = temps[6];
  const plus12 = temps[12];

  const high = data.daily.temperature_2m_max[0];
  const low = data.daily.temperature_2m_min[0];

  const mainLayer = getLayerData(now);

  resultsDiv.innerHTML = `
    <div class="main">

      <div class="temp">${now.toFixed(1)}°C</div>

      <div class="section-title">Weather now</div>

      <div class="layers">${mainLayer.count} layers needed</div>
      <div class="emoji-row">${mainLayer.emojis}</div>
      <div>${mainLayer.label}</div>

      <div class="weather">
        ${locationName}<br/>
        High: ${high.toFixed(1)}°C<br/>
        Low: ${low.toFixed(1)}°C
      </div>

      <div class="small-cards">
        ${smallCard("+6h", plus6)}
        ${smallCard("+12h", plus12)}
      </div>

    </div>
  `;
}

// 🧥 Layer logic (with more outfit variety)
function getLayerData(temp) {
  if (temp >= 25) return { count: 1, emojis: "👕 🩳", label: "Light and breezy" };
  if (temp >= 18) return { count: 2, emojis: "👕 🧥 👖", label: "Light jacket weather" };
  if (temp >= 10) return { count: 3, emojis: "👕 🧥 👖 🧣", label: "Cool, layer up" };
  if (temp >= 0) return { count: 4, emojis: "🧥 🧣 🧤 👖", label: "Cold, stay warm" };
  return { count: 5, emojis: "🧥 🧣 🧤 🧦 🥾", label: "Bundle up 🥶" };
}

// small cards
function smallCard(time, temp) {
  const layer = getLayerData(temp);

  return `
    <div class="small-card">
      <div class="time">${time}</div>
      <div>${temp.toFixed(1)}°C</div>
      <div>${layer.count} layers</div>
      <div>${layer.emojis}</div>
    </div>
  `;
}
</script>

</body>
</html>
